<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnovaKit — Ecosistema IoT</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ============================================================
           VARIABLES DE DISEÑO
           ============================================================ */
        :root {
            --sky:      #daeaf6;   /* Color exacto del cielo de la imagen */
            --panel-bg: rgba(10, 16, 12, 0.97);
            --text:     #F4F4F2;
            --muted:    #8A9BA8;
            --line:     rgba(255,255,255,0.08);

            --c1: #26C6DA;   /* Gateway    — Cyan   */
            --c2: #F4B41A;   /* Marquesina — Dorado */
            --c3: #E53935;   /* Beneficio  — Rojo   */
            --c4: #4CAF50;   /* Clima      — Verde  */

            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
            --ease-spring:   cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ============================================================
           SHELL — sin overflow, sin scroll, fondo = color cielo
           ============================================================ */
        html, body {
            width: 100%; height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--sky);
            color: var(--text);
            overflow: hidden;
        }

        /* ============================================================
           APP-CONTAINER — centra el wrapper, fondo idéntico al cielo
           para que no haya costuras visibles en ningún extremo
           ============================================================ */
        .app {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--sky);
        }

        /* ============================================================
           MAP-WRAPPER — el único contenedor que escala
           
           SOLUCIÓN DEFINITIVA SIN BORDES NEGROS:
           Se usa min() en AMBAS dimensiones para que el wrapper
           nunca desborde el viewport en ninguna orientación ni
           ratio de pantalla (portrait, ultrawide, 4:3, etc.)

             width  = min(100vw,  100vh × 16/9)
             height = min(100vh,  100vw × 9/16)

           Dado que width y height derivan del mismo constraint,
           el elemento siempre mantiene 16:9 y cabe perfecto.
           El fondo es var(--sky) por si la imagen nativa no es
           exactamente 16:9 y aparece letterbox — el color se funde.
           ============================================================ */
        .map-wrapper {
            position: relative;
            width:  min(100vw, calc(100vh * 16 / 9));
            height: min(100vh, calc(100vw * 9 / 16));
            background: var(--sky);
            overflow: hidden;
            /* Sutil sombra interior para reforzar integración con fondo */
            box-shadow: inset 0 0 60px rgba(0,0,0,0.08);
        }

        /* ============================================================
           IMAGEN DE FONDO
           object-fit: contain → siempre muestra la imagen completa.
           Si el ratio nativo ≠ 16:9, el letterboxing usa --sky.
           ============================================================ */
        .farm-img {
            width: 100%; height: 100%;
            display: block;
            object-fit: contain;
            object-position: center;
            filter: brightness(0.92) contrast(1.04) saturate(1.05);
            user-select: none;
            -webkit-user-drag: none;
        }

        /* ============================================================
           AVISO ORIENTACIÓN MÓVIL
           ============================================================ */
        .rotate-notice {
            display: none;
            position: fixed; inset: 0; z-index: 9999;
            background: #0a100c;
            flex-direction: column;
            justify-content: center; align-items: center;
            gap: 20px; text-align: center; padding: 40px;
        }
        .rotate-notice i { font-size: 48px; color: var(--c4); animation: rotate-icon 2s ease-in-out infinite; }
        .rotate-notice p { font-size: 15px; color: var(--muted); line-height: 1.6; }
        @keyframes rotate-icon { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} }

        @media (max-width: 600px) and (orientation: portrait) {
            .rotate-notice { display: flex; }
        }

        /* ============================================================
           TOP BAR
           ============================================================ */
        .top-bar {
            position: absolute; top: 0; left: 0;
            width: 100%; z-index: 50;
            padding: clamp(12px,2.5%,24px) clamp(16px,3.5%,40px);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, transparent 100%);
            pointer-events: none;
        }

        .logo {
            display: flex; align-items: center; gap: 10px;
            font-size: clamp(14px, 2vw, 22px);
            font-weight: 700; letter-spacing: -0.3px;
        }
        .logo-icon {
            width: clamp(28px,3.5vw,38px); height: clamp(28px,3.5vw,38px);
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(12px,1.6vw,16px);
            color: var(--c4);
        }
        .logo-text span { color: var(--muted); font-weight: 300; }
        .tagline {
            font-size: clamp(8px,1vw,10px);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 4px;
            padding-left: 48px;
        }

        .hint {
            pointer-events: all;
            display: flex; align-items: center; gap: 8px;
            font-size: clamp(9px,1.1vw,12px);
            color: var(--text);
            background: rgba(0,0,0,0.45);
            padding: clamp(4px,0.8%,8px) clamp(10px,1.5%,18px);
            border-radius: 30px;
            border: 1px solid var(--line);
            backdrop-filter: blur(8px);
        }
        .hint-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--c4); animation: blink 1.8s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        /* ============================================================
           BOTTOM BAR — PILLS DE NAVEGACIÓN
           ============================================================ */
        .bottom-bar {
            position: absolute; bottom: clamp(12px,3%,28px); left: 0;
            width: 100%; z-index: 50;
            display: flex; justify-content: center;
            gap: clamp(6px,1%,12px);
            flex-wrap: wrap;
            padding: 0 clamp(10px,2%,24px);
        }

        .pill {
            display: flex; align-items: center; gap: 7px;
            padding: clamp(5px,0.8%,8px) clamp(10px,1.5%,18px);
            border-radius: 40px;
            font-size: clamp(9px,1vw,11px);
            font-weight: 500;
            cursor: pointer;
            background: rgba(8,12,10,0.65);
            border: 1px solid var(--line);
            color: var(--muted);
            backdrop-filter: blur(10px);
            transition: color .25s, background .25s, border-color .25s, transform .2s;
            user-select: none;
        }
        .pill i { font-size: 11px; transition: color .25s; }
        .pill:hover { color: var(--text); background: rgba(8,12,10,0.92); transform: translateY(-2px); }

        .pill[data-zone="gateway"]    i { color: var(--c1); }
        .pill[data-zone="marquesina"] i { color: var(--c2); }
        .pill[data-zone="beneficio"]  i { color: var(--c3); }
        .pill[data-zone="clima"]      i { color: var(--c4); }
        .pill[data-zone="gateway"]:hover    { border-color: var(--c1); }
        .pill[data-zone="marquesina"]:hover { border-color: var(--c2); }
        .pill[data-zone="beneficio"]:hover  { border-color: var(--c3); }
        .pill[data-zone="clima"]:hover      { border-color: var(--c4); }

        /* ============================================================
           HOTSPOTS
           POSICIONADOS VÍA JS (ver función positionHotspots).
           Usan data-rel-top / data-rel-left como % sobre la imagen real.
           ============================================================ */
        .hotspot {
            position: absolute; z-index: 30;
            cursor: pointer;
            transform: translate(-50%, -50%);
            width: 36px; height: 36px;
            display: flex; justify-content: center; align-items: center;
            /* Oculto hasta que JS calcule posición exacta */
            opacity: 0;
            transition: opacity .3s;
        }
        .hotspot.ready { opacity: 1; }

        /* Anillo exterior pulsante */
        .hs-pulse {
            position: absolute; inset: 0;
            border: 1.5px solid var(--zone-color);
            border-radius: 50%;
            animation: pulse 2.8s cubic-bezier(.215,.61,.355,1) infinite;
        }
        @keyframes pulse {
            0%   { transform: scale(.4); opacity: .9; }
            100% { transform: scale(2);  opacity: 0; }
        }

        /* Anillo medio */
        .hs-ring {
            position: absolute;
            width: 18px; height: 18px;
            border: 1.5px solid var(--zone-color);
            border-radius: 50%;
            transition: width .25s, height .25s, border-color .25s;
        }

        /* Núcleo */
        .hs-core {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid var(--zone-color);
            box-shadow: 0 0 12px var(--zone-color);
            position: relative; z-index: 1;
            transition: transform .25s, background .25s;
        }

        .hotspot:hover .hs-ring  { width: 28px; height: 28px; }
        .hotspot:hover .hs-core  { transform: scale(1.4); background: var(--zone-color); }

        /* Colores por zona */
        [data-zone="gateway"]    { --zone-color: var(--c1); }
        [data-zone="marquesina"] { --zone-color: var(--c2); }
        [data-zone="beneficio"]  { --zone-color: var(--c3); }
        [data-zone="clima"]      { --zone-color: var(--c4); }

        /* ============================================================
           POPUP FLOTANTE DE DISPOSITIVOS
           ============================================================ */
        .popup {
            position: absolute; z-index: 60;
            display: flex; gap: 10px;
            background: rgba(10,16,12,0.96);
            backdrop-filter: blur(18px);
            padding: clamp(10px,1.5%,16px);
            border-radius: 14px;
            border-top: 2.5px solid #fff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05);
            transform: translate(-50%, 0) scale(.88);
            opacity: 0; pointer-events: none;
            transition: opacity .3s var(--ease-spring), transform .3s var(--ease-spring);
            /* Nunca desborde por la derecha en móvil */
            max-width: calc(100vw - 32px);
            flex-wrap: wrap;
            justify-content: center;
        }
        .popup.show {
            transform: translate(-50%, 14px) scale(1);
            opacity: 1; pointer-events: all;
        }

        .dev-card {
            width: clamp(72px,9vw,90px);
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer;
            transition: transform .2s var(--ease-spring);
            padding: 4px;
            border-radius: 10px;
        }
        .dev-card:hover { transform: translateY(-5px); }
        .dev-card img {
            width: clamp(58px,7.5vw,76px);
            height: clamp(58px,7.5vw,76px);
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 7px;
            background: #111;
        }
        .dev-card span {
            font-size: clamp(8px,0.9vw,10px);
            font-weight: 500; color: var(--text);
            text-align: center; line-height: 1.3;
        }

        /* ============================================================
           PANEL LATERAL — DASHBOARD REDISEÑO
           ============================================================ */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 100; opacity: 0; pointer-events: none;
            transition: opacity .4s;
        }
        .overlay.on { opacity: 1; pointer-events: all; }

        .panel {
            position: fixed; top: 0; right: 0;
            width: min(400px, 100vw);
            height: 100%;
            background: #080e0a;
            border-left: 1px solid rgba(255,255,255,0.07);
            z-index: 110;
            transform: translateX(102%);
            transition: transform .5s var(--ease-out-expo);
            overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column;
            box-shadow: -30px 0 70px rgba(0,0,0,0.8);
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.07) transparent;
        }
        .panel.on { transform: translateX(0); }

        .panel-accent {
            height: 2px; flex-shrink: 0;
            background: linear-gradient(90deg, var(--panel-color) 0%, transparent 100%);
        }

        /* — Close row — */
        .panel-close-row {
            position: sticky; top: 0; z-index: 10;
            display: flex; justify-content: flex-start;
            padding: 14px 20px 0;
            background: #080e0a;
        }
        .panel-close-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            color: var(--muted); font-size: 12px; cursor: pointer;
            transition: background .2s, color .2s;
        }
        .panel-close-btn:hover { background: rgba(255,255,255,0.09); color: var(--text); }

        /* — Header: nombre + ícono + badge — */
        .pd-header {
            padding: 18px 22px 0;
            display: flex; align-items: flex-start; gap: 12px;
        }
        .pd-icon {
            width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: var(--panel-color);
        }
        .pd-name  { font-size: 17px; font-weight: 700; letter-spacing: -.3px; line-height: 1.2; }
        .pd-sub   { font-size: 10.5px; color: var(--muted); font-weight: 400; margin-top: 2px; }
        .pd-badge {
            margin-left: auto; flex-shrink: 0;
            display: flex; align-items: center; gap: 5px;
            font-size: 8.5px; letter-spacing: 1px; text-transform: uppercase; font-weight: 600;
            color: #4ade80;
            background: rgba(74,222,128,0.07);
            border: 1px solid rgba(74,222,128,0.14);
            padding: 4px 9px; border-radius: 20px;
        }
        .pd-badge::before {
            content: ''; width: 5px; height: 5px;
            border-radius: 50%; background: #4ade80;
            animation: blink 2s infinite;
        }

        /* — Foto del dispositivo — */
        .pd-photo-wrap {
            margin: 18px 22px 0;
            border-radius: 10px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.07);
            background: #0d150f;
            height: 175px; position: relative;
        }
        .pd-photo {
            width: 100%; height: 100%;
            object-fit: cover; object-position: center; display: block;
            filter: brightness(0.93) contrast(1.05);
        }
        .pd-photo-wrap::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 45%;
            background: linear-gradient(to top, #080e0a 0%, transparent 100%);
        }

        /* — Descripción breve — */
        .pd-desc {
            padding: 14px 22px 0;
            font-size: 12px; line-height: 1.7;
            color: #7a9188; font-weight: 300;
        }

        /* — Dashboard de métricas — */
        .pd-dashboard { padding: 20px 22px 36px; }

        .dash-label {
            font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
            color: var(--panel-color); font-weight: 600;
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 12px;
        }
        .dash-label::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.06); }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
        }
        .metrics-grid.g1 { grid-template-columns: 1fr; }
        .metrics-grid.g3 { grid-template-columns: 1fr 1fr 1fr; }

        .mc {
            background: #0c1410;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 9px;
            padding: 13px 13px 11px;
            position: relative; overflow: hidden;
            transition: border-color .2s, background .2s;
        }
        .mc:hover { border-color: rgba(255,255,255,0.1); background: #101c13; }
        .mc::before {
            content: '';
            position: absolute; left: 0; top: 22%; bottom: 22%;
            width: 2px; border-radius: 1px;
            background: var(--panel-color); opacity: .45;
        }
        .mc.wide { grid-column: 1 / -1; }

        .mc-icon  { font-size: 10px; color: var(--panel-color); opacity:.65; margin-bottom:7px; }
        .mc-label { font-size: 8.5px; letter-spacing:.7px; text-transform:uppercase; color:var(--muted); font-weight:500; margin-bottom:3px; }
        .mc-val   { font-size: 21px; font-weight:700; letter-spacing:-.5px; line-height:1; color:var(--text); }
        .mc-val .u { font-size:10px; font-weight:400; color:var(--muted); margin-left:2px; }
        .mc-note  { font-size:9px; color:var(--muted); margin-top:5px; font-weight:300; }

        /* barra de progreso */
        .mc-bar { margin-top:8px; height:2px; border-radius:1px; background:rgba(255,255,255,0.05); overflow:hidden; }
        .mc-bar-fill { height:100%; border-radius:1px; background:var(--panel-color); opacity:.55; }

        /* estado ON/OFF/PEND */
        .mc.s-on   .mc-val { font-size:13px; letter-spacing:1px; color:#4ade80; }
        .mc.s-off  .mc-val { font-size:13px; letter-spacing:1px; color:#f87171; }
        .mc.s-pend .mc-val { font-size:13px; letter-spacing:1px; color:#f59e0b; }

        /* Panel móvil */
        @media (max-width: 600px) {
            .panel {
                top:auto; bottom:0; width:100%; height:91vh;
                border-left:none; border-top:2px solid var(--panel-color);
                border-radius:20px 20px 0 0;
                transform:translateY(105%);
            }
            .panel.on { transform:translateY(0); }
            .panel-accent { display:none; }
            .panel-close-row::before {
                content:''; position:absolute; top:8px; left:50%; transform:translateX(-50%);
                width:32px; height:3px; background:rgba(255,255,255,0.09); border-radius:2px;
            }
            .pd-photo-wrap { height:145px; }
        }
    </style>
</head>
<body>

<!-- AVISO DE ORIENTACIÓN -->
<div class="rotate-notice">
    <i class="fa-solid fa-mobile-screen-button"></i>
    <p>Para una mejor experiencia,<br>gira tu dispositivo en modo <strong>horizontal</strong>.</p>
</div>

<div class="app">
    <div class="map-wrapper" id="map-wrapper">

        <!-- Imagen isométrica de la finca -->
        <img id="farm-img" class="farm-img" src="./finca-isometrica.jpg" alt="Finca Cafetera">

        <!-- ============================================================
             HOTSPOTS
             data-rel-top  = % vertical   relativo al área renderizada de la imagen
             data-rel-left = % horizontal relativo al área renderizada de la imagen
             
             Para ajustar posiciones precisas: usar hotspot-editor.html
             ============================================================ -->
        <div class="hotspot" id="hs-gateway"    data-zone="gateway"    data-rel-top="29.72" data-rel-left="30.64" onclick="openPopup('gateway',event)">
            <div class="hs-pulse"></div>
            <div class="hs-ring"></div>
            <div class="hs-core"></div>
        </div>
        <div class="hotspot" id="hs-marquesina" data-zone="marquesina" data-rel-top="49.72" data-rel-left="32.56" onclick="openPopup('marquesina',event)">
            <div class="hs-pulse"></div>
            <div class="hs-ring"></div>
            <div class="hs-core"></div>
        </div>
        <div class="hotspot" id="hs-beneficio"  data-zone="beneficio"  data-rel-top="47.07" data-rel-left="54.75" onclick="openPopup('beneficio',event)">
            <div class="hs-pulse"></div>
            <div class="hs-ring"></div>
            <div class="hs-core"></div>
        </div>
        <div class="hotspot" id="hs-clima"      data-zone="clima"      data-rel-top="28.07" data-rel-left="62.76" onclick="openPopup('clima',event)">
            <div class="hs-pulse"></div>
            <div class="hs-ring"></div>
            <div class="hs-core"></div>
        </div>

        <!-- Popup flotante -->
        <div id="popup" class="popup"></div>

        <!-- Top bar (dentro del wrapper → position: absolute correcto) -->
        <div class="top-bar">
            <div>
                <div class="logo">
                    <div class="logo-icon"><i class="fa-solid fa-seedling"></i></div>
                    <div class="logo-text">InnovaKit <span>/ Sense AI</span></div>
                </div>
                <div class="tagline">Ecosistema IoT · Finca Cafetera</div>
            </div>
            <div class="hint">
                <span class="hint-dot"></span>
                Toca un punto para ver los equipos
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
            <div class="pill" data-zone="gateway"    onclick="triggerZone('gateway')">   <i class="fa-solid fa-tower-broadcast"></i>      La Finca</div>
            <div class="pill" data-zone="marquesina" onclick="triggerZone('marquesina')"><i class="fa-solid fa-temperature-arrow-up"></i>  Marquesina</div>
            <div class="pill" data-zone="beneficio"  onclick="triggerZone('beneficio')"> <i class="fa-solid fa-droplet"></i>               Beneficio</div>
            <div class="pill" data-zone="clima"      onclick="triggerZone('clima')">     <i class="fa-solid fa-cloud-sun-rain"></i>         Est. Clima</div>
        </div>

    </div><!-- /map-wrapper -->

    <!-- Overlay y panel lateral (position: fixed → fuera del wrapper) -->
    <div class="overlay" id="overlay" onclick="closePanel()"></div>
    <div class="panel" id="panel">
        <div class="panel-accent" id="panel-accent"></div>
        <div class="panel-close-row">
            <button class="panel-close-btn" onclick="closePanel()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="panel-body"></div>
    </div>
</div>

<script>
/* ================================================================
   BASE DE DATOS DE ZONAS Y DISPOSITIVOS
   ================================================================ */
const DATA = {
    gateway: {
        color: 'var(--c1)',
        devices: [{
            name: 'Gateway IoT', img: './gatewat-iot.jpg.png',
            icon: 'fa-tower-broadcast',
            title: 'Gateway IoT', sub: 'Infraestructura de comunicaciones',
            desc: 'El Gateway IoT es el cerebro de comunicaciones de la finca. Recibe en tiempo real toda la información de los sensores y garantiza transmisión estable hacia la nube mediante LTE/LoRa con redundancia automática.',
            metrics: [

/* ================================================================
   POSICIONAMIENTO PRECISO DE HOTSPOTS
   ================================================================
   
   PROBLEMA: Los hotspots llevan coordenadas (data-rel-top, data-rel-left)
   como % relativos al área VISUAL de la imagen, no al map-wrapper.
   Con object-fit: contain, la imagen puede tener barras (letterboxing)
   arriba/abajo o izquierda/derecha. Los % del wrapper no coinciden.

   SOLUCIÓN: Calcular el área renderizada de la imagen dentro del wrapper
   usando las dimensiones nativas (naturalWidth, naturalHeight) y convertir
   los % relativos a la imagen en píxeles absolutos dentro del wrapper.
   
   Se recalcula en cada resize mediante ResizeObserver.
   ================================================================ */
const img     = document.getElementById('farm-img');
const wrapper = document.getElementById('map-wrapper');

function getImageBounds() {
    const wW = wrapper.offsetWidth;
    const wH = wrapper.offsetHeight;
    // Usa dimensiones nativas; fallback al tamaño renderizado
    const iW = img.naturalWidth  || img.offsetWidth;
    const iH = img.naturalHeight || img.offsetHeight;

    if (!iW || !iH) return { rW: wW, rH: wH, ox: 0, oy: 0 };

    const wRatio = wW / wH;
    const iRatio = iW / iH;

    let rW, rH, ox, oy;
    if (iRatio > wRatio) {
        // Imagen más ancha → letterbox vertical (barras arriba y abajo)
        rW = wW;
        rH = wW / iRatio;
        ox = 0;
        oy = (wH - rH) / 2;
    } else {
        // Imagen más alta → letterbox horizontal (barras izq y der)
        rH = wH;
        rW = wH * iRatio;
        oy = 0;
        ox = (wW - rW) / 2;
    }
    return { rW, rH, ox, oy };
}

function positionAll() {
    const { rW, rH, ox, oy } = getImageBounds();
    document.querySelectorAll('.hotspot').forEach(hs => {
        const relT = parseFloat(hs.dataset.relTop)  / 100;
        const relL = parseFloat(hs.dataset.relLeft) / 100;
        hs.style.top  = (oy + relT * rH) + 'px';
        hs.style.left = (ox + relL * rW) + 'px';
        hs.classList.add('ready');
    });
}

// Posicionar al cargar la imagen
img.addEventListener('load', positionAll);
if (img.complete && img.naturalWidth) positionAll();

// Reposicionar en cada cambio de tamaño (zoom, rotate, resize)
const ro = new ResizeObserver(positionAll);
ro.observe(wrapper);

/* ================================================================
   LÓGICA DE UI
   ================================================================ */
const popup   = document.getElementById('popup');
const panel   = document.getElementById('panel');
const overlay = document.getElementById('overlay');
const body    = document.getElementById('panel-body');
const accent  = document.getElementById('panel-accent');

function openPopup(zoneId, e) {
    e.stopPropagation();
    const zone = DATA[zoneId];
    if (!zone) return;

    popup.innerHTML = zone.devices.map((d, i) => `
        <div class="dev-card" onclick="openPanel('${zoneId}',${i},event)">
            <img src="${d.img}" alt="${d.name}" onerror="this.src='https://placehold.co/100x100/111/888?text=·'">
            <span>${d.name}</span>
        </div>
    `).join('');

    popup.style.borderTopColor = zone.color;

    // Posición bajo el hotspot
    const hs = e.currentTarget;
    popup.style.top  = hs.style.top;
    popup.style.left = hs.style.left;

    popup.classList.add('show');
}

function openPanel(zoneId, idx, e) {
    e?.stopPropagation();
    popup.classList.remove('show');

    const zone   = DATA[zoneId];
    const device = zone.devices[idx];

    panel.style.setProperty('--panel-color', zone.color);
    accent.style.background = `linear-gradient(90deg,${zone.color},transparent)`;

    // — Construir tarjetas de métricas —
    const metricsHTML = device.metrics.map(m => {
        const isStatus = m.status !== undefined;
        const cls = isStatus
            ? (m.status === 'on'  ? 'mc s-on'
             : m.status === 'off' ? 'mc s-off'
             : 'mc s-pend')
            : 'mc';
        const barHTML = (!isStatus && m.bar !== undefined && m.bar > 0)
            ? `<div class="mc-bar"><div class="mc-bar-fill" style="width:${m.bar}%"></div></div>` : '';
        return `
        <div class="${cls}">
            <div class="mc-icon"><i class="fa-solid ${m.icon}"></i></div>
            <div class="mc-label">${m.label}</div>
            <div class="mc-val">${m.value}${m.unit ? `<span class="u">${m.unit}</span>` : ''}</div>
            ${m.note ? `<div class="mc-note">${m.note}</div>` : ''}
            ${barHTML}
        </div>`;
    }).join('');

    // — Grid según cantidad de métricas —
    const count = device.metrics.length;
    const gridClass = count <= 2 ? 'metrics-grid g1'
                    : count === 3 ? 'metrics-grid g3'
                    : 'metrics-grid';

    body.innerHTML = `
        <div class="pd-header">
            <div class="pd-icon"><i class="fa-solid ${device.icon}"></i></div>
            <div>
                <div class="pd-name">${device.title}</div>
                <div class="pd-sub">${device.sub}</div>
            </div>
            <div class="pd-badge">Online</div>
        </div>

        <div class="pd-photo-wrap">
            <img class="pd-photo" src="${device.img}" alt="${device.name}"
                 onerror="this.src='https://placehold.co/400x175/0c1410/666?text=${encodeURIComponent(device.name)}'">
        </div>

        <p class="pd-desc">${device.desc}</p>

        <div class="pd-dashboard">
            <div class="dash-label">Variables de medición</div>
            <div class="${gridClass}">
                ${metricsHTML}
            </div>
        </div>
    `;

    panel.classList.add('on');
    overlay.classList.add('on');
}

function triggerZone(zoneId) {
    document.getElementById('hs-' + zoneId).click();
}

function closePanel() {
    panel.classList.remove('on');
    overlay.classList.remove('on');
}

document.addEventListener('click', e => {
    if (!e.target.closest('.hotspot') && !e.target.closest('.popup')) {
        popup.classList.remove('show');
    }
});
</script>
