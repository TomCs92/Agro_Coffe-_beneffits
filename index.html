<!-- 
    ========================================================================
    DASHBOARD INTERACTIVO: ECOSISTEMA IoT PARA FINCA CAFETERA
    ========================================================================
    Versión mejorada con arquitectura aspect-ratio 16:9 inteligente
    Nombre: InnovaKit - Ecosistema IoT
    Descripción: Dashboard que visualiza dispositivos IoT en diferentes zonas 
                 de una finca cafetera manteniendo proporción correcta con zoom
    Técnologia: HTML5 + CSS3 + Vanilla JavaScript (sin librerías externas)
    ========================================================================
-->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnovaKit - Ecosistema IoT</title>

    <!-- Importación de fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ================================================================================
           SECCIÓN 1: VARIABLES GLOBALES - Sistema de diseño centralizado
           =============================================================================== */
        :root {
            --bg-dark: rgba(10, 15, 12, 0.85);
            --panel-bg: rgba(12, 18, 14, 0.95);
            --text-main: #F9F9F9;
            --text-sec: #A3A3A3;
            --border-light: rgba(255, 255, 255, 0.1);
            
            /* Colores de las 4 zonas */
            --z1-color: #26C6DA;  /* Gateway - Cyan */
            --z2-color: #F4B41A;  /* Marquesina - Dorado */
            --z3-color: #E53935;  /* Beneficio - Rojo */
            --z4-color: #4CAF50;  /* Clima - Verde */
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        /* ================================================================================
           SECCIÓN 2: LAYOUT PRINCIPAL - Sistema aspect-ratio 16:9 para responsive
           ===============================================================================
           Este sistema asegura que el zoom del navegador no distorsione la imagen
           manteniendo la proporción 16:9 sin importar el tamaño de la pantalla.
        */
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background-color: #000;
            color: var(--text-main);
            overflow: hidden;
        }

        /* Contenedor principal */
        .app-container { 
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        /* Contenedor INTELIGENTE con aspect-ratio 16:9 
           Esto es LO MÁS IMPORTANTE: mantiene la proporción de la imagen
           sin importar el zoom o tamaño de pantalla */
        .map-wrapper {
            position: relative;
            width: 100%;
            max-width: 100%;
            aspect-ratio: 16 / 9;  /* ⭐⭐⭐ CLAVE: Proporción fija */
            overflow: hidden;
            background-color: #000;
        }

        /* Imagen de fondo - Dentro del wrapper */
        .farm-image {
            width: 100%;
            height: 100%;
            object-fit: contain;  /* Muestra toda la imagen sin recortar */
            z-index: 1;
            filter: brightness(0.9) contrast(1.05);
        }

        /* ================================================================================
           SECCIÓN 3: BARRA SUPERIOR - Logo e instrucciones
           =============================================================================== */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            flex-direction: row-reverse;
        }

        .logo-area { 
            text-align: right; 
        }

        .logo {
            font-family: 'DM Sans', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
        }

        .logo i { 
            color: var(--text-main);
            font-size: 20px;
        }

        .tagline {
            font-size: 10px;
            color: var(--text-sec);
            margin-top: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .instruction {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-main);
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid var(--border-light);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cursor-blink { animation: blink 1.5s infinite; }

        @keyframes blink { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.3; } 
        }

        /* ================================================================================
           SECCIÓN 4: BARRA INFERIOR - Botones de navegación
           =============================================================================== */
        .bottom-bar {
            position: absolute;
            bottom: 25px;
            left: 0;
            width: 100%;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .nav-pill {
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-light);
            color: var(--text-sec);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-pill i { 
            font-size: 12px;
        }

        .nav-pill:hover {
            color: var(--text-main);
            background: rgba(0, 0, 0, 0.9);
            transform: translateY(-2px);
        }

        .nav-pill.p-z1 i { color: var(--z1-color); }
        .nav-pill.p-z1:hover { border-color: var(--z1-color); }

        .nav-pill.p-z2 i { color: var(--z2-color); }
        .nav-pill.p-z2:hover { border-color: var(--z2-color); }

        .nav-pill.p-z3 i { color: var(--z3-color); }
        .nav-pill.p-z3:hover { border-color: var(--z3-color); }

        .nav-pill.p-z4 i { color: var(--z4-color); }
        .nav-pill.p-z4:hover { border-color: var(--z4-color); }

        /* RESPONSIVE: Pills de navegación en móvil */
        @media (max-width: 768px) {
            .nav-pill {
                padding: 6px 12px;
                font-size: 9px;
            }

            .nav-pill i { 
                font-size: 10px;
            }

            .bottom-bar {
                bottom: 15px;
                gap: 8px;
                padding: 0 10px;
            }

            .instruction {
                font-size: 10px;
                padding: 4px 10px;
                gap: 5px;
            }

            .logo {
                font-size: 16px;
            }

            .tagline {
                font-size: 8px;
            }

            .top-bar {
                padding: 12px 15px;
            }
        }

        /* RESPONSIVE: En pantallas pequeñas (menor de 480px) */
        @media (max-width: 480px) {
            .nav-pill {
                padding: 4px 8px;
                font-size: 8px;
            }

            .device-card {
                width: 70px;
            }

            .device-card img {
                width: 60px;
                height: 60px;
            }

            .device-card span {
                font-size: 8px;
            }

            .device-popup {
                padding: 10px;
                gap: 8px;
            }

            .logo {
                font-size: 14px;
            }
        }

        /* RESPONSIVE: Versión móvil extrema - Panel desde abajo */
        @media (max-width: 600px) {
            .side-panel {
                top: auto;
                bottom: 0;
                width: 100%;
                border-left: none;
                border-top: 3px solid var(--panel-color);
                border-radius: 20px 20px 0 0;
                max-height: 85vh;
                transform: translateY(100%);
                box-shadow: 0 -20px 50px rgba(0, 0, 0, 0.6);
            }

            .panel-top-accent {
                width: 40px;
                height: 4px;
                margin: 8px auto;
                border-radius: 2px;
            }

            .panel-close {
                top: 20px;
                left: auto;
                right: 25px;
            }

            .panel-content {
                padding: 0 25px 40px 25px;
            }

            .panel-header {
                margin-bottom: 25px;
            }

            .side-panel-overlay {
                background: rgba(0, 0, 0, 0.3);
            }
        }

        /* ================================================================================
           SECCIÓN 5: HOTSPOTS - Puntos interactivos pulsantes
           =============================================================================== */
        .hotspot {
            position: absolute;
            z-index: 20;
            cursor: pointer;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hotspot-core {
            width: 8px;
            height: 8px;
            background-color: #FFF;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        .hotspot-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 1px solid var(--current-color);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            transition: all 0.3s ease;
        }

        .hotspot-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            border: 1px solid var(--current-color);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: pulse-ring 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { 
                width: 15px; 
                height: 15px; 
                opacity: 1;
            }
            100% { 
                width: 50px; 
                height: 50px; 
                opacity: 0;
            }
        }

        .hotspot:hover .hotspot-core {
            transform: scale(1.3);
            background-color: var(--current-color);
        }

        .hotspot:hover .hotspot-ring {
            width: 30px;
            height: 30px;
            border-width: 2px;
        }

        #hs-gateway { --current-color: var(--z1-color); }
        #hs-marquesina { --current-color: var(--z2-color); }
        #hs-beneficio { --current-color: var(--z3-color); }
        #hs-clima { --current-color: var(--z4-color); }

        /* ================================================================================
           SECCIÓN 6: POPUP FLOTANTE - Tarjetas de equipos
           =============================================================================== */
        .device-popup {
            position: absolute;
            z-index: 80;
            display: flex;
            gap: 12px;
            background: rgba(12, 18, 14, 0.95);
            backdrop-filter: blur(15px);
            padding: 15px;
            border-radius: 12px;
            border-top: 3px solid #FFF;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            transform: translate(-50%, 0) scale(0.9);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .device-popup.show {
            transform: translate(-50%, 15px) scale(1);
            opacity: 1;
            pointer-events: all;
        }

        .device-card {
            width: 85px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .device-card:hover {
            transform: translateY(-5px);
        }

        .device-card img {
            width: 70px;
            height: 70px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 8px;
            background-color: #111;
        }

        .device-card span {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-main);
            text-align: center;
            line-height: 1.3;
        }

        /* ================================================================================
           SECCIÓN 7: PANEL LATERAL - Información detallada
           =============================================================================== */
        .side-panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(3px);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .side-panel-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .side-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 450px;
            max-width: 100vw;
            height: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            z-index: 200;
            transform: translateX(100%);
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-light);
            box-shadow: -20px 0 50px rgba(0, 0, 0, 0.6);
        }

        /* RESPONSIVE: En pantallas pequeñas, el panel ocupa todo el ancho */
        @media (max-width: 768px) {
            .side-panel {
                width: 100%;
                border-left: none;
                border-top: 3px solid var(--panel-color);
            }

            .side-panel.open {
                transform: translateY(0);
            }

            .panel-content {
                padding: 30px 25px 40px;
                padding-top: 50px;
            }

            .panel-title {
                font-size: 18px;
            }

            .section-text {
                font-size: 13px;
                line-height: 1.5;
            }
        }

        .side-panel.open {
            transform: translateX(0);
        }

        .panel-top-accent {
            width: 100%;
            height: 4px;
            background-color: var(--panel-color);
            flex-shrink: 0;
        }

        .panel-close {
            position: absolute;
            top: 25px;
            left: 30px;
            background: transparent;
            border: none;
            color: var(--text-sec);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .panel-close:hover {
            color: var(--text-main);
        }

        .panel-content {
            padding: 40px;
            padding-top: 60px;
        }

        .panel-header {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 40px;
        }

        .panel-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-light);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: var(--panel-color);
            flex-shrink: 0;
        }

        .panel-titles {
            flex: 1;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .panel-subtitle {
            font-size: 12px;
            color: var(--text-sec);
            font-weight: 400;
        }

        .panel-section {
            margin-bottom: 30px;
        }

        .section-label {
            font-size: 9px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--panel-color);
            margin-bottom: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-light);
        }

        .section-text {
            font-size: 14px;
            line-height: 1.6;
            color: #D1D5DB;
            font-weight: 300;
        }

        .panel-list {
            list-style: none;
            margin-top: 10px;
        }

        .panel-list li {
            position: relative;
            padding-left: 18px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #D1D5DB;
            line-height: 1.5;
            font-weight: 300;
        }

        .panel-list li::before {
            content: "•";
            position: absolute;
            left: 0;
            top: 0;
            color: var(--panel-color);
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- CONTENEDOR 16:9 INTELIGENTE - Mantiene proporción sin distorsionar con zoom -->
        <div class="map-wrapper" id="map-wrapper">
            
            <!-- Imagen de fondo isométrica -->
            <img id="main-farm-image" 
                 class="farm-image" 
                 src="./finca-isometrica.jpg" 
                 alt="Finca Cafetera Isometrica">

            <!-- HOTSPOT 1: Gateway (Antena en la casa) -->
            <div class="hotspot" id="hs-gateway" style="top: 16%; left: 31%;" onclick="openPopup('gateway', event)">
                <div class="hotspot-pulse"></div>
                <div class="hotspot-ring"></div>
                <div class="hotspot-core"></div>
            </div>

            <!-- HOTSPOT 2: Marquesina (Túnel de secado) -->
            <div class="hotspot" id="hs-marquesina" style="top: 58%; left: 24%;" onclick="openPopup('marquesina', event)">
                <div class="hotspot-pulse"></div>
                <div class="hotspot-ring"></div>
                <div class="hotspot-core"></div>
            </div>

            <!-- HOTSPOT 3: Beneficio (Procesamiento/Tanques) -->
            <div class="hotspot" id="hs-beneficio" style="top: 54%; left: 72%;" onclick="openPopup('beneficio', event)">
                <div class="hotspot-pulse"></div>
                <div class="hotspot-ring"></div>
                <div class="hotspot-core"></div>
            </div>

            <!-- HOTSPOT 4: Estación Clima (Estación al fondo) -->
            <div class="hotspot" id="hs-clima" style="top: 34%; left: 55%;" onclick="openPopup('clima', event)">
                <div class="hotspot-pulse"></div>
                <div class="hotspot-ring"></div>
                <div class="hotspot-core"></div>
            </div>

            <!-- POPUP FLOTANTE - Tarjetas de equipos -->
            <div id="device-popup" class="device-popup"></div>
        </div>

        <!-- Barra superior -->
        <div class="top-bar">
            <div class="logo-area">
                <div class="logo">InnovaKit <i class="fa-solid fa-seedling"></i></div>
                <div class="tagline">Ecosistema IoT • Sense AI</div>
            </div>
            <div class="instruction">
                <span class="cursor-blink">👆</span> Toca un punto para ver los equipos
            </div>
        </div>

        <!-- Barra inferior -->
        <div class="bottom-bar">
            <div class="nav-pill p-z1" onclick="triggerHotspot('gateway')"><i class="fa-solid fa-tower-broadcast"></i> La Finca</div>
            <div class="nav-pill p-z2" onclick="triggerHotspot('marquesina')"><i class="fa-solid fa-temperature-arrow-up"></i> Marquesina</div>
            <div class="nav-pill p-z3" onclick="triggerHotspot('beneficio')"><i class="fa-solid fa-droplet"></i> Beneficio</div>
            <div class="nav-pill p-z4" onclick="triggerHotspot('clima')"><i class="fa-solid fa-cloud-sun-rain"></i> Estación Clima</div>
        </div>

        <!-- Panel lateral -->
        <div class="side-panel-overlay" id="overlay" onclick="closePanel()"></div>
        <div class="side-panel" id="side-panel">
            <div class="panel-top-accent"></div>
            <button class="panel-close" onclick="closePanel()"><i class="fa-solid fa-xmark"></i></button>
            <div class="panel-content" id="panel-dynamic-content"></div>
        </div>

    </div>

    <script>
        /* ================================================================================
           BASE DE DATOS - Estructura de zonas y equipos
           ===============================================================================
           Contiene toda la información sobre las 4 zonas de la finca y sus dispositivos.
        */
        const farmData = {
            gateway: {
                zoneColor: "var(--z1-color)",
                devices: [
                    {
                        name: "Gateway IoT",
                        image: "./gatewat-iot.jpg.png",
                        icon: "fa-tower-broadcast",
                        title: "Gateway IoT",
                        subtitle: "Infraestructura de comunicaciones",
                        sections: [
                            {
                                label: "Conectividad Central",
                                content: "<p class='section-text'>El Gateway IoT es el cerebro de comunicaciones de la finca. Recibe en tiempo real toda la información de los diferentes dispositivos y garantiza que los datos lleguen de forma estable a la nube.</p>"
                            }
                        ]
                    }
                ]
            },
            marquesina: {
                zoneColor: "var(--z2-color)",
                devices: [
                    {
                        name: "Secafé",
                        image: "./secafe.jpg.png",
                        icon: "fa-scale-balanced",
                        title: "Secafé",
                        subtitle: "Medición de humedad y peso",
                        sections: [
                            {
                                label: "Control de Baches",
                                content: "<p class='section-text'>Sistema avanzado de medición de humedad y peso diseñado para el proceso de secado del café, realizando mediciones precisas segmentadas por baches.</p>"
                            }
                        ]
                    },
                    {
                        name: "Sense Atmos",
                        image: "./sense-atmos.jpg.png",
                        icon: "fa-temperature-half",
                        title: "Sense Atmos",
                        subtitle: "Automatización de clima interior",
                        sections: [
                            {
                                label: "Control de Ventilación",
                                content: "<p class='section-text'>Sensor ambiental equipado con un sistema de control de ventilación. Toma decisiones autónomas para encender o apagar el extractor si detecta temperaturas inseguras.</p>"
                            }
                        ]
                    }
                ]
            },
            beneficio: {
                zoneColor: "var(--z3-color)",
                devices: [
                    {
                        name: "Sense Flow",
                        image: "./sense-flow.jpg.png",
                        icon: "fa-water",
                        title: "Sense Flow",
                        subtitle: "Caudalímetro de precisión",
                        sections: [
                            {
                                label: "Trazabilidad Hídrica",
                                content: "<p class='section-text'>Dispositivo de medición exacta del caudal de entrada de agua al proceso de beneficio. Garantiza control estricto de recursos.</p>"
                            }
                        ]
                    },
                    {
                        name: "Válvula Inteligente",
                        image: "https://placehold.co/100x100/E53935/FFFFFF?text=Valvula",
                        icon: "fa-faucet-drip",
                        title: "Válvula Inteligente",
                        subtitle: "Control de flujo de agua",
                        sections: [
                            {
                                label: "Interrupción de Paso",
                                content: "<p class='section-text'>Válvula automatizada interconectada al Sense Flow. Permite ejecutar cortes de flujo de forma remota o automática.</p>"
                            }
                        ]
                    },
                    {
                        name: "Atmos View",
                        image: "./sense-atmos-view.jpg.png",
                        icon: "fa-display",
                        title: "Sense Atmos View",
                        subtitle: "Monitor local de condiciones",
                        sections: [
                            {
                                label: "Visualización en Planta",
                                content: "<p class='section-text'>Sensor con pantalla integrada para visualización inmediata en fases de lavado y fermentación sin necesidad de revisar el celular.</p>"
                            }
                        ]
                    }
                ]
            },
            clima: {
                zoneColor: "var(--z4-color)",
                devices: [
                    {
                        name: "Sense Weather",
                        image: "https://placehold.co/100x100/4CAF50/FFFFFF?text=Weather",
                        icon: "fa-cloud-sun-rain",
                        title: "Sense Weather",
                        subtitle: "Estación Meteorológica Integrada",
                        sections: [
                            {
                                label: "Variables de Medición",
                                content: "<ul class='panel-list'><li>Temperatura y Humedad ambiental</li><li>Velocidad y Dirección del viento</li><li>Pluviómetro</li><li>Intensidad de rayos UV</li><li>Energía solar (W/m²)</li><li>Pronóstico algorítmico</li></ul>"
                            }
                        ]
                    }
                ]
            }
        };

        const popup = document.getElementById('device-popup');
        const sidePanel = document.getElementById('side-panel');
        const overlay = document.getElementById('overlay');
        const dynamicContent = document.getElementById('panel-dynamic-content');

        /* Abre el popup flotante con tarjetas de equipos */
        function openPopup(zoneId, event) {
            event.stopPropagation();
            const zoneData = farmData[zoneId];
            if (!zoneData) return;

            let cardsHTML = '';
            zoneData.devices.forEach((device, index) => {
                cardsHTML += `
                    <div class="device-card" onclick="openDevicePanel('${zoneId}', ${index}, event)">
                        <img src="${device.image}" alt="${device.name}" onerror="this.src='https://placehold.co/100x100/111/FFF?text=Equip';">
                        <span>${device.name}</span>
                    </div>
                `;
            });
            
            popup.innerHTML = cardsHTML;
            popup.style.borderColor = zoneData.zoneColor;
            const hotspot = event.currentTarget;
            popup.style.top = hotspot.style.top;
            popup.style.left = hotspot.style.left;
            popup.classList.add('show');
        }

        /* Abre el panel lateral con información detallada del equipo */
        function openDevicePanel(zoneId, deviceIndex, event) {
            event.stopPropagation();
            popup.classList.remove('show');

            const zoneData = farmData[zoneId];
            const device = zoneData.devices[deviceIndex];

            sidePanel.style.setProperty('--panel-color', zoneData.zoneColor);

            // Detecta si es móvil para aplicar estilos dinámicos
            const isMobile = window.innerWidth <= 768;
            
            let htmlHTML = `
                <div class="panel-header">
                    <div class="panel-icon"><i class="fa-solid ${device.icon}"></i></div>
                    <div class="panel-titles">
                        <h2 class="panel-title">${device.title}</h2>
                        <h3 class="panel-subtitle">${device.subtitle}</h3>
                    </div>
                </div>
            `;

            device.sections.forEach(sec => {
                htmlHTML += `
                    <div class="panel-section">
                        <div class="section-label">${sec.label}</div>
                        ${sec.content}
                    </div>
                `;
            });

            dynamicContent.innerHTML = htmlHTML;
            sidePanel.classList.add('open');
            overlay.classList.add('active');
        }

        /* Simula un clic en el hotspot desde los botones inferiores */
        function triggerHotspot(zoneId) {
            const hs = document.getElementById('hs-' + zoneId);
            hs.click();
        }

        /* Cierra el panel lateral */
        function closePanel() {
            sidePanel.classList.remove('open');
            overlay.classList.remove('active');
        }

        /* Cierra el popup si haces clic fuera de él */
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.hotspot') && !e.target.closest('.device-popup')) {
                popup.classList.remove('show');
            }
        });
    </script>
</body>
</html>
